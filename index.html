<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>G2 Car Nav</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ef;
      --surface: #ffffff;
      --border: #e4e1da;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6560;
      --text-muted: #9e9890;
      --accent: #3a6b3a;
      --accent-light: #eef4ee;
      --accent-text: #2d542d;
      --danger: #b94040;
      --danger-light: #fdf1f1;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
    }

    .logo-text h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .logo-text span {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Form */
    #nav-form {
      flex-direction: column;
      gap: 14px;
    }

    #nav-form, #active-nav { display: flex; }

    label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
      display: block;
    }

    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(58, 107, 58, 0.1);
    }

    input[type="text"]::placeholder { color: var(--text-muted); }

    .btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .btn:active { opacity: 0.8; transform: scale(0.99); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-danger {
      background: var(--danger-light);
      color: var(--danger);
      border: 1px solid #f0d0d0;
    }

    .btn-secondary {
      background: var(--bg);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    /* Active navigation */
    #active-nav {
      flex-direction: column;
      gap: 12px;
      display: none;
    }

    .nav-info {
      background: var(--accent-light);
      border: 1px solid #d4e8d4;
      border-radius: 10px;
      padding: 14px 16px;
    }

    .nav-info-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--accent-text);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 4px;
    }

    .speed-display {
      font-size: 30px;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn-row .btn { flex: 1; }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    /* Gestures hint */
    .hint h3 {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 10px;
    }

    .hint-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--text-secondary);
      padding: 4px 0;
    }

    .hint-row span:first-child {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* Status */
    #status-bar {
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      min-height: 18px;
    }

    /* Map debug preview */
    #map-preview {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 16px;
    }

    #map-preview.visible { display: flex; }

    #map-preview label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    #map-debug {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      image-rendering: pixelated;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">&#9652;</div>
      <div class="logo-text">
        <h1>G2 Car Nav</h1>
        <span>Even Realities G2</span>
      </div>
    </div>

    <!-- Destination input -->
    <form id="nav-form">
      <div>
        <label for="destination">Destination</label>
        <input
          type="text"
          id="destination"
          placeholder="e.g. Eiffel Tower, Paris"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <button type="submit" class="btn btn-primary">Start Navigation</button>
    </form>

    <!-- Active navigation -->
    <div id="active-nav">
      <div class="nav-info">
        <div class="nav-info-label">Speed</div>
        <div class="speed-display" id="speed">-- km/h</div>
      </div>
      <div class="btn-row">
        <button id="recalc-btn" class="btn btn-secondary">Recalculate</button>
        <button id="stop-btn" class="btn btn-danger">Stop</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Gestures -->
    <div class="hint">
      <h3>G2 Gestures</h3>
      <div class="hint-row"><span>Swipe Up</span><span>Preview next step</span></div>
      <div class="hint-row"><span>Swipe Down</span><span>Go back a step</span></div>
      <div class="hint-row"><span>Press</span><span>Return to current</span></div>
      <div class="hint-row"><span>Double Press</span><span>Recalculate</span></div>
    </div>
  </div>

  <div id="status-bar">Connecting to G2...</div>

  <div id="map-preview">
    <label>Map preview (sent to glasses)</label>
    <canvas id="map-debug"></canvas>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
