<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>G2 Car Nav</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: #00e5a0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f0f0f0;
    }

    .logo span {
      font-size: 12px;
      color: #888;
      display: block;
      font-weight: 400;
    }

    /* Destination form */
    #nav-form {
      flex-direction: column;
      gap: 12px;
    }

    #nav-form, #active-nav {
      display: flex;
    }

    label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
      display: block;
    }

    input[type="text"] {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 14px;
      color: #f0f0f0;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: #00e5a0;
    }

    input[type="text"]::placeholder {
      color: #555;
    }

    .btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:active { opacity: 0.75; }

    .btn-primary {
      background: #00e5a0;
      color: #000;
    }

    .btn-danger {
      background: #ff4d4d;
      color: #fff;
    }

    .btn-secondary {
      background: #2a2a2a;
      color: #ccc;
      border: 1px solid #333;
    }

    /* Active navigation panel */
    #active-nav {
      flex-direction: column;
      gap: 14px;
      display: none;
    }

    .nav-info {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px;
    }

    .nav-info-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .speed-display {
      font-size: 28px;
      font-weight: 700;
      color: #00e5a0;
      font-variant-numeric: tabular-nums;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn-row .btn {
      flex: 1;
    }

    /* Status bar */
    #status-bar {
      margin-top: 20px;
      font-size: 12px;
      color: #666;
      text-align: center;
      min-height: 18px;
    }

    /* Gestures hint */
    .hint {
      margin-top: 16px;
      background: #131313;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 12px 14px;
    }

    .hint h3 {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .hint-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
      padding: 2px 0;
    }

    .hint-row span:first-child {
      color: #00e5a0;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">&#9652;</div>
      <h1>G2 Car Nav <span>Even Realities G2</span></h1>
    </div>

    <!-- Destination input form (shown when not navigating) -->
    <form id="nav-form">
      <div>
        <label for="destination">Destination</label>
        <input
          type="text"
          id="destination"
          placeholder="e.g. Eiffel Tower, Paris"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <button type="submit" class="btn btn-primary">Start Navigation</button>
    </form>

    <!-- Active navigation panel (shown while navigating) -->
    <div id="active-nav">
      <div class="nav-info">
        <div class="nav-info-label">Speed</div>
        <div class="speed-display" id="speed">-- km/h</div>
      </div>

      <div class="btn-row">
        <button id="recalc-btn" class="btn btn-secondary">Recalculate</button>
        <button id="stop-btn" class="btn btn-danger">Stop</button>
      </div>
    </div>

    <!-- Glasses gesture cheat-sheet -->
    <div class="hint">
      <h3>G2 Gestures</h3>
      <div class="hint-row"><span>Swipe Up</span><span>Preview next step</span></div>
      <div class="hint-row"><span>Swipe Down</span><span>Go back a step</span></div>
      <div class="hint-row"><span>Press</span><span>Return to current</span></div>
      <div class="hint-row"><span>Double Press</span><span>Recalculate route</span></div>
    </div>
  </div>

  <div id="status-bar">Connecting to G2...</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
